name: Refresh market data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 13-21 * * 1-5"

permissions:
  contents: write

concurrency:
  group: refresh-market-data
  cancel-in-progress: true

jobs:
  refresh:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install market data dependencies
        run: python -m pip install --upgrade yfinance

      - name: Refresh yfinance snapshot
        run: python scripts/fetch_yfinance_data.py

      - name: Commit refreshed snapshot
        run: |
          if git diff --quiet -- public/data/yfinance-snapshot.json; then
            echo "Market data snapshot is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/yfinance-snapshot.json
          git commit -m "chore: refresh market data snapshot"
          git push origin main
